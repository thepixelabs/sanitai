[graph]
targets = [
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-musl",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]

[advisories]
# Schema v2 (cargo-deny >= 0.16). Vulnerability advisories always error;
# severity/notice/vulnerability keys were removed upstream.
version    = 2
db-path    = "~/.cargo/advisory-db"
db-urls    = ["https://github.com/rustsec/advisory-db"]
yanked     = "deny"
ignore = [
  # `paste` proc-macro is unmaintained (RUSTSEC-2024-0436). Pulled in
  # transitively by ratatui; no security impact, no drop-in replacement
  # yet. Revisit when ratatui upgrades its macro stack.
  "RUSTSEC-2024-0436",
  # `rand` 0.8 is unsound only when a custom `log` logger calls
  # `rand::rng()` (RUSTSEC-2026-0097). SanitAI does not install a custom
  # logger — this advisory is not reachable in our call graph.
  "RUSTSEC-2026-0097",
]

[licenses]
# Schema v2: anything not in `allow` is denied. The old `unlicensed`,
# `copyleft`, and `deny` keys were removed in cargo-deny 0.18.4. Copyleft
# licenses (GPL/LGPL/AGPL) are rejected implicitly by not being listed here.
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "OpenSSL",
]

# Workspace crates don't set `license` in their Cargo.toml (they inherit
# the repo-root MIT LICENSE file but aren't published to crates.io).
# `ignore = true` tells cargo-deny to skip license checks for any crate
# with `publish = false` or an empty `publish` allowlist.
[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards         = "deny"
# Internal workspace crates use path deps without a version requirement,
# which cargo resolves as `*`. This flag exempts path/git deps on
# private (unpublished) crates from the wildcard check.
allow-wildcard-paths = true

# CRITICAL: these crates indicate network capability in the dep tree.
# Their presence is a build-breaking security violation.
deny = [
  { name = "reqwest",   reason = "no network allowed in SanitAI" },
  { name = "hyper",     reason = "no network allowed in SanitAI" },
  { name = "tokio",     reason = "async runtime implies potential network use" },
  { name = "curl",      reason = "no network allowed in SanitAI" },
  { name = "openssl",   reason = "use rustls; openssl has large CVE surface" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
