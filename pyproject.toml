# This file configures python-semantic-release for automated versioning.
# SanitAI is a Rust project — this file is NOT a Python build config.

[tool.semantic_release]
version_toml = ["Cargo.toml:workspace.package.version"]
branch = "main"
commit_parser = "angular"
tag_format = "v{version}"
changelog_file = "CHANGELOG.md"

[tool.semantic_release.commit_parser_options]
# Release rules mirror altergo's config:
#   feat       → minor
#   fix        → patch
#   perf       → patch
#   refactor   → patch
#   revert     → patch
# Everything else (docs, style, test, build, ci, chore) → no release
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "refactor", "revert"]

[tool.semantic_release.changelog]
exclude_commit_patterns = [
    "^style",
    "^test",
    "^build",
    "^ci",
    "^chore",
]

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.publish]
upload_to_pypi = false
upload_to_release = true

[tool.semantic_release.remote]
type = "github"

[tool.semantic_release.remote.token]
env = "GH_TOKEN"
