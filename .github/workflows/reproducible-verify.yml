name: Reproducible Build Verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (commit SHA or tag) to verify'
        required: false
        default: ''

permissions: {}

concurrency:
  group: reproducible-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "1.87.0"
  BIN_NAME: sanitai
  TARGET: x86_64-unknown-linux-gnu

jobs:
  build-matrix:
    name: Build on ${{ matrix.runner }} (runner ${{ matrix.id }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: a
            runner: ubuntu-latest
          - id: b
            runner: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.87.0"
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: reproducible-${{ matrix.id }}

      - name: Cache pip downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ziglang-${{ hashFiles('.github/workflows/reproducible-verify.yml') }}

      - name: Install zig + cargo-zigbuild
        # Pin cargo-zigbuild: 0.22+ requires rustc 1.88, but this repo is pinned
        # to 1.87.0 via rust-toolchain.toml. Bump this in lockstep with the
        # rustc version pin.
        run: |
          pip install ziglang
          cargo install cargo-zigbuild --version '^0.21' --locked

      - name: Verify Cargo.lock committed
        run: |
          test -f Cargo.lock
          git diff --exit-code Cargo.lock

      - name: Reproducible build
        env:
          SOURCE_DATE_EPOCH: "0"
          RUSTFLAGS: "-C codegen-units=1 -C strip=symbols --remap-path-prefix=${{ github.workspace }}=."
          CARGO_PROFILE_RELEASE_LTO: "true"
        run: |
          cargo zigbuild --release --locked --target ${{ env.TARGET }} --workspace --bin ${{ env.BIN_NAME }}

      - name: Compute binary SHA-256
        id: hash
        run: |
          BIN_PATH="target/${{ env.TARGET }}/release/${{ env.BIN_NAME }}"
          ls -la "$BIN_PATH"
          SHA=$(sha256sum "$BIN_PATH" | awk '{print $1}')
          echo "Runner ${{ matrix.id }} produced SHA-256: $SHA"
          echo "$SHA" > "binary-sha256-${{ matrix.id }}.txt"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload hash
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sha-${{ matrix.id }}
          path: binary-sha256-${{ matrix.id }}.txt
          if-no-files-found: error

  diff-hashes:
    name: Verify reproducibility
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download hashes
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: hashes
          pattern: sha-*
          merge-multiple: true

      - name: Compare
        run: |
          set -euo pipefail
          SHA_A=$(cat hashes/binary-sha256-a.txt)
          SHA_B=$(cat hashes/binary-sha256-b.txt)
          echo "Runner A: $SHA_A"
          echo "Runner B: $SHA_B"
          if [ "$SHA_A" != "$SHA_B" ]; then
            echo "::error::Reproducible build verification FAILED: binary hashes differ across runners."
            echo "  runner-a: $SHA_A"
            echo "  runner-b: $SHA_B"
            exit 1
          fi
          echo "::notice::Reproducible build verified. SHA-256: $SHA_A"
