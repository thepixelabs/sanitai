name: Reproducible Build Verification
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (commit SHA or tag) to verify'
        required: false
        default: ''

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.87.0"
  BIN_NAME: sanitai
  TARGET: x86_64-unknown-linux-gnu

jobs:
  build-matrix:
    name: Build on ${{ matrix.runner }} (runner ${{ matrix.id }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: a
            runner: ubuntu-latest
          - id: b
            runner: ubuntu-22.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
          targets: x86_64-unknown-linux-gnu

      - name: Install zig + cargo-zigbuild
        run: |
          pip install ziglang
          cargo install cargo-zigbuild --locked

      - name: Verify Cargo.lock committed
        run: |
          test -f Cargo.lock
          git diff --exit-code Cargo.lock

      - name: Reproducible build
        env:
          SOURCE_DATE_EPOCH: "0"
          RUSTFLAGS: "-C codegen-units=1 -C strip=symbols --remap-path-prefix=${{ github.workspace }}=."
          CARGO_PROFILE_RELEASE_LTO: "true"
        run: |
          cargo zigbuild --release --locked --target ${{ env.TARGET }} --workspace --bin ${{ env.BIN_NAME }}

      - name: Compute binary SHA-256
        id: hash
        run: |
          BIN_PATH="target/${{ env.TARGET }}/release/${{ env.BIN_NAME }}"
          ls -la "$BIN_PATH"
          SHA=$(sha256sum "$BIN_PATH" | awk '{print $1}')
          echo "Runner ${{ matrix.id }} produced SHA-256: $SHA"
          echo "$SHA" > "binary-sha256-${{ matrix.id }}.txt"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload hash
        uses: actions/upload-artifact@v4
        with:
          name: sha-${{ matrix.id }}
          path: binary-sha256-${{ matrix.id }}.txt
          if-no-files-found: error

  diff-hashes:
    name: Verify reproducibility
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Download hashes
        uses: actions/download-artifact@v4
        with:
          path: hashes
          pattern: sha-*
          merge-multiple: true

      - name: Compare
        run: |
          set -euo pipefail
          SHA_A=$(cat hashes/binary-sha256-a.txt)
          SHA_B=$(cat hashes/binary-sha256-b.txt)
          echo "Runner A: $SHA_A"
          echo "Runner B: $SHA_B"
          if [ "$SHA_A" != "$SHA_B" ]; then
            echo "::error::Reproducible build verification FAILED: binary hashes differ across runners."
            echo "  runner-a: $SHA_A"
            echo "  runner-b: $SHA_B"
            exit 1
          fi
          echo "::notice::Reproducible build verified. SHA-256: $SHA_A"
