name: Release

on:
  push:
    branches: [main]

# Deny all permissions by default; the release job grants only what it needs.
permissions: {}

# Never cancel an in-flight release — a second push queues behind the running
# job rather than killing it mid-way through version bumping and tag creation.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push version-bump commit and tag
      issues: write        # comment on issues referenced in commits
      pull-requests: write # comment on merged PRs with release link

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          persist-credentials: true  # required for git push

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # semantic-release runs `cargo update --workspace` as build_command to
      # keep Cargo.lock in sync with the bumped workspace version. Match the
      # toolchain pin used everywhere else so the lockfile format is stable.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.87.0"

      - name: Cache pip downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-release-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-release-

      - name: Install release tooling
        run: pip install "python-semantic-release==9.21.1"

      - name: Configure git bot identity
        run: |
          git config --global user.name "Ground Control"
          git config --global user.email "ground-control@users.noreply.github.com"

      - name: Run python-semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: semantic-release version --push
