name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --locked
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check
      - name: canary scan
        run: |
          # If sanitai binary exists, run it on the repo to catch accidental real secrets
          if [ -f target/release/sanitai ]; then
            ./target/release/sanitai scan . --exit-zero || echo "canary: findings present (review output)"
          fi

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  bench-gate:
    runs-on: [self-hosted, perf-runner]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench --workspace -- --output-format bencher | tee bench_output.txt
      - name: Compare against baseline
        run: |
          if [ -f bench-baseline/results.txt ]; then
            # critcmp or simple awk comparison
            echo "Benchmark comparison would run here"
          fi
