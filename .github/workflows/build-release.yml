name: Build & Publish Release

on:
  push:
    tags:
      - 'v*'

# Deny all by default; each job grants only what it needs.
permissions: {}

env:
  RUST_TOOLCHAIN: "1.87.0"
  BIN_NAME: sanitai

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
    outputs:
      sha_aarch64_apple_darwin: ${{ steps.hash.outputs.sha_aarch64_apple_darwin }}
      sha_x86_64_apple_darwin: ${{ steps.hash.outputs.sha_x86_64_apple_darwin }}
      sha_x86_64_unknown_linux_gnu: ${{ steps.hash.outputs.sha_x86_64_unknown_linux_gnu }}
      sha_aarch64_unknown_linux_gnu: ${{ steps.hash.outputs.sha_aarch64_unknown_linux_gnu }}
      sha_x86_64_unknown_linux_musl: ${{ steps.hash.outputs.sha_x86_64_unknown_linux_musl }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Extract release version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.87.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      - name: Verify Cargo.lock is committed and unchanged
        run: |
          if [ ! -f Cargo.lock ]; then
            echo "Cargo.lock is not committed to the repository"
            exit 1
          fi
          git diff --exit-code Cargo.lock

      - name: Cache pip downloads
        if: matrix.cross == true
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ziglang-${{ hashFiles('.github/workflows/build-release.yml') }}

      - name: Install zig + cargo-zigbuild (Linux cross targets)
        if: matrix.cross == true
        # Pin cargo-zigbuild: 0.22+ requires rustc 1.88, but this repo is pinned
        # to 1.87.0 via rust-toolchain.toml. Bump this in lockstep with the
        # rustc version pin.
        run: |
          pip install ziglang
          cargo install cargo-zigbuild --version '^0.21' --locked

      - name: Build (Linux, cargo-zigbuild)
        if: matrix.cross == true
        env:
          SOURCE_DATE_EPOCH: "0"
          RUSTFLAGS: "-C codegen-units=1 -C strip=symbols --remap-path-prefix=${{ github.workspace }}=."
          CARGO_PROFILE_RELEASE_LTO: "true"
        run: |
          cargo zigbuild --release --locked --target ${{ matrix.target }} --workspace --bin ${{ env.BIN_NAME }}

      - name: Build (macOS, native)
        if: matrix.cross == false
        env:
          SOURCE_DATE_EPOCH: "0"
          RUSTFLAGS: "-C codegen-units=1 -C strip=symbols --remap-path-prefix=${{ github.workspace }}=."
          CARGO_PROFILE_RELEASE_LTO: "true"
        run: |
          cargo build --release --locked --target ${{ matrix.target }} --workspace --bin ${{ env.BIN_NAME }}

      - name: Strip binary (belt-and-braces)
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          if [ -f "$BIN_PATH" ]; then
            if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
              strip -x "$BIN_PATH" || true
            else
              strip "$BIN_PATH" || true
            fi
          fi

      - name: Create archive
        id: archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          BIN_PATH="target/${TARGET}/release/${{ env.BIN_NAME }}"
          STAGE="dist/${{ env.BIN_NAME }}-${VERSION}-${TARGET}"
          mkdir -p "$STAGE"
          cp "$BIN_PATH" "$STAGE/"
          cp README.md "$STAGE/" 2>/dev/null || true
          cp LICENSE* "$STAGE/" 2>/dev/null || true
          ARCHIVE="${{ env.BIN_NAME }}-${VERSION}-${TARGET}.tar.gz"
          tar --sort=name \
              --mtime='UTC 1970-01-01' \
              --owner=0 --group=0 --numeric-owner \
              -czf "dist/${ARCHIVE}" -C dist "${{ env.BIN_NAME }}-${VERSION}-${TARGET}" \
              2>/dev/null || \
          tar -czf "dist/${ARCHIVE}" -C dist "${{ env.BIN_NAME }}-${VERSION}-${TARGET}"
          echo "archive=dist/${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: hash
        run: |
          ARCHIVE="${{ steps.archive.outputs.archive }}"
          if command -v sha256sum >/dev/null 2>&1; then
            SHA=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          else
            SHA=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          fi
          echo "${SHA}  $(basename ${ARCHIVE})" > "${ARCHIVE}.sha256"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          TARGET_KEY=$(echo "${{ matrix.target }}" | tr '-' '_')
          echo "sha_${TARGET_KEY}=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7
          if-no-files-found: error

  sign:
    name: Sign artifacts
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
        with:
          cosign-release: 'v2.2.4'

      - name: Sign each archive (keyless OIDC)
        run: |
          cd dist
          for f in *.tar.gz; do
            echo "Signing $f"
            cosign sign-blob \
              --yes \
              --oidc-issuer=https://token.actions.githubusercontent.com \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert" \
              "$f"
          done
          ls -la

      - name: Upload signatures
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signatures
          path: |
            dist/*.sig
            dist/*.cert
          retention-days: 7
          if-no-files-found: error

  provenance-hashes:
    name: Collect hashes for provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Generate base64-encoded SHA-256 manifest
        id: hashes
        run: |
          cd dist
          HASHES=$(sha256sum *.tar.gz | base64 -w0)
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance
    needs: provenance-hashes
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563 # v2.0.0
    with:
      base64-subjects: ${{ needs.provenance-hashes.outputs.hashes }}
      # upload-assets: true would have SLSA upload provenance.intoto.jsonl to
      # the GitHub release — but the release does not exist yet at this point
      # (the `release` job below creates it). Leaving this false keeps
      # provenance as a workflow artifact; the release job downloads and
      # uploads it with the rest of the artifacts so everything ships
      # together on the tagged release.
      upload-assets: false

  sbom:
    name: Generate SBOM
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.87.0"
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json --override-filename sbom.cyclonedx
      - name: Collect SBOM
        run: |
          mkdir -p dist
          find . -name 'sbom.cyclonedx.json' -not -path './dist/*' -exec cp {} dist/ \;
          ls -la dist/
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: dist/sbom.cyclonedx.json
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    # SLSA v2.0.0's "final" reporter step exits 27 when upload-assets=false,
    # which would block this job. Depend on SLSA's outcome with `always()`
    # so the release still publishes even if provenance reporting fails.
    # We download the provenance artifact opportunistically below.
    needs: [build, sign, provenance, sbom]
    if: always() && needs.build.result == 'success' && needs.sign.result == 'success' && needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_macos_arm64: ${{ steps.shas.outputs.sha_macos_arm64 }}
      sha_macos_x64: ${{ steps.shas.outputs.sha_macos_x64 }}
      sha_linux_x64: ${{ steps.shas.outputs.sha_linux_x64 }}
      sha_linux_arm64: ${{ steps.shas.outputs.sha_linux_arm64 }}
      sha_linux_musl_x64: ${{ steps.shas.outputs.sha_linux_musl_x64 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Extract release version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Download signatures
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: signatures
          path: dist

      - name: Download SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom
          path: dist

      # SLSA generator publishes provenance.intoto.jsonl as an artifact whose
      # name equals the release tag (e.g. `v0.2.2.intoto.jsonl`). Using a
      # glob pattern keeps this resilient to any future renames.
      - name: Download SLSA provenance
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: "*.intoto.jsonl"
          merge-multiple: true

      - name: Export per-target SHA-256 outputs
        id: shas
        run: |
          cd dist
          get_sha() { sha256sum "$1" 2>/dev/null | awk '{print $1}'; }
          VERSION="${{ steps.version.outputs.version }}"
          BIN=sanitai
          echo "sha_macos_arm64=$(get_sha ${BIN}-${VERSION}-aarch64-apple-darwin.tar.gz)" >> "$GITHUB_OUTPUT"
          echo "sha_macos_x64=$(get_sha ${BIN}-${VERSION}-x86_64-apple-darwin.tar.gz)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x64=$(get_sha ${BIN}-${VERSION}-x86_64-unknown-linux-gnu.tar.gz)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_arm64=$(get_sha ${BIN}-${VERSION}-aarch64-unknown-linux-gnu.tar.gz)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_musl_x64=$(get_sha ${BIN}-${VERSION}-x86_64-unknown-linux-musl.tar.gz)" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # semantic-release already created the release with auto-generated
        # notes — `gh release create` would fail with "already exists". Probe
        # first and only create when missing; then upload all artifacts with
        # --clobber so a retried run is idempotent.
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --generate-notes --verify-tag
          fi
          cd dist
          # Provenance glob is optional — SLSA may or may not have produced
          # files depending on matrix outcome. Expand only what exists.
          shopt -s nullglob
          FILES=( *.tar.gz *.sha256 *.sig *.cert sbom.cyclonedx.json *.intoto.jsonl )
          gh release upload "$TAG" "${FILES[@]}" --clobber

  bump-tap:
    name: Open version-bump PR against homebrew-tap
    needs: release
    # The `release` job above uses `if: always() && ...` so it can publish
    # even when the SLSA final-reporter step exits 27. Without matching
    # `always()` here, GitHub marks this downstream job skipped because
    # some transitive upstream (SLSA provenance/final) failed.
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Generate tap bot installation token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: thepixelabs
          repositories: homebrew-tap

      - name: Clone homebrew-tap
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          TAG: v${{ needs.release.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/thepixelabs/homebrew-tap.git" tap
          cd tap
          git config user.name "thepixelabs-homebrew-bot[bot]"
          git config user.email "thepixelabs-homebrew-bot[bot]@users.noreply.github.com"
          git checkout -b "bump/sanitai-${TAG}"

      - name: Update Formula/sanitai.rb
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA_MACOS_ARM64: ${{ needs.release.outputs.sha_macos_arm64 }}
          SHA_MACOS_X64: ${{ needs.release.outputs.sha_macos_x64 }}
          SHA_LINUX_X64: ${{ needs.release.outputs.sha_linux_x64 }}
          SHA_LINUX_ARM64: ${{ needs.release.outputs.sha_linux_arm64 }}
        run: |
          cd tap
          FILE="Formula/sanitai.rb"
          # Update version
          sed -i -E "s|^(  version )\".*\"|\\1\"${VERSION}\"|" "$FILE"
          # Update URLs (version embedded in URL)
          OLD_VERSION=$(grep -oP 'sanitai-\K[0-9]+\.[0-9]+\.[0-9]+' "$FILE" | head -1)
          sed -i "s|sanitai-${OLD_VERSION}-|sanitai-${VERSION}-|g" "$FILE"
          # Update sha256 values by target order (macos arm64, macos x64, linux arm64, linux x64)
          python3 - <<'PYEOF'
          import re, os
          file = "Formula/sanitai.rb"
          content = open(file).read()
          shas = {
            "aarch64-apple-darwin":      os.environ["SHA_MACOS_ARM64"],
            "x86_64-apple-darwin":       os.environ["SHA_MACOS_X64"],
            "aarch64-unknown-linux-gnu": os.environ["SHA_LINUX_ARM64"],
            "x86_64-unknown-linux-gnu":  os.environ["SHA_LINUX_X64"],
          }
          for target, sha in shas.items():
            # Find the url line for this target and replace the sha256 on the next line
            content = re.sub(
              r'(url "[^"]*' + re.escape(target) + r'[^"]*"\n\s*sha256 )"[^"]*"',
              r'\g<1>"' + sha + '"',
              content
            )
          open(file, "w").write(content)
          print("Updated Formula/sanitai.rb")
          PYEOF

      - name: Commit and push
        env:
          TAG: v${{ needs.release.outputs.version }}
        run: |
          cd tap
          git add Formula/sanitai.rb
          git commit -m "bump: sanitai ${TAG}"
          git push origin "bump/sanitai-${TAG}"

      - name: Open PR
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          TAG: v${{ needs.release.outputs.version }}
          VERSION: ${{ needs.release.outputs.version }}
          SHA_MACOS_ARM64: ${{ needs.release.outputs.sha_macos_arm64 }}
          SHA_MACOS_X64: ${{ needs.release.outputs.sha_macos_x64 }}
          SHA_LINUX_X64: ${{ needs.release.outputs.sha_linux_x64 }}
          SHA_LINUX_ARM64: ${{ needs.release.outputs.sha_linux_arm64 }}
        run: |
          cd tap
          gh pr create \
            --repo thepixelabs/homebrew-tap \
            --title "bump: sanitai ${TAG}" \
            --body "Automated version bump from [thepixelabs/sanitai](https://github.com/thepixelabs/sanitai/releases/tag/${TAG}).

          - **version:** ${VERSION}
          - **sha256 macOS arm64:** \`${SHA_MACOS_ARM64}\`
          - **sha256 macOS x64:** \`${SHA_MACOS_X64}\`
          - **sha256 Linux x64:** \`${SHA_LINUX_X64}\`
          - **sha256 Linux arm64:** \`${SHA_LINUX_ARM64}\`

          Auto-merges if CI passes and diff is version/sha256/url only." \
            --label version-bump \
            --head "bump/sanitai-${TAG}" \
            --base main
